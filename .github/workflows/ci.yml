name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/market-web/package-lock.json
      - run: uv sync --project apps/api
      - run: npm install --prefix apps/market-web
      - run: uv run --project apps/api --directory apps/api pytest
      - run: npm run build:web
