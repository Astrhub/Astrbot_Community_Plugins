name: Code Quality Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  api:
    name: Python API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies
        run: uv sync --project apps/api --locked

      - name: Lint API
        run: uv run --project apps/api --directory apps/api ruff check .

      - name: Test API
        run: uv run --project apps/api --directory apps/api pytest

  web:
    name: Vue market
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/market-web/package-lock.json

      - name: Install web dependencies
        run: npm ci --prefix apps/market-web

      - name: Build web app
        run: npm run build:web
