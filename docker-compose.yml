services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: astrbot-community-plugins:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8787}:8787"
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      APP_ENV_FILE: /app/apps/api/.env
      WEB_URL: ${WEB_URL:-http://127.0.0.1:8787}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://127.0.0.1:8787}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      ENABLE_DEV_AUTH: ${ENABLE_DEV_AUTH:-false}
    volumes:
      - ./apps/api/.env:/app/apps/api/.env

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-market}
      POSTGRES_USER: ${POSTGRES_USER:-market}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-market}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
